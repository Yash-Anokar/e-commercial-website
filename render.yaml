services:
  - type: web
    name: vapc-ecommerce
    env: python
    pythonVersion: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

databases:
  - name: vapc-postgres
    databaseName: vasundhara_agro_db
    user: vapc_user
